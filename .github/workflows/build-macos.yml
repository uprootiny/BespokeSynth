name: Build macOS

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Sonoma (arm64+x86_64)
            runner: macos-14
            archs: 'arm64;x86_64'
          - name: macOS Sequoia (arm64)
            runner: macos-15
            archs: 'arm64'
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Python 3.10 (universal pkg)
        run: |
          wget -q https://www.python.org/ftp/python/3.10.0/python-3.10.0post2-macos11.pkg
          sudo installer -pkg python-3.10.0post2-macos11.pkg -target /
          /Library/Frameworks/Python.framework/Versions/3.10/bin/python3 --version

      - name: Install appdmg
        run: npm install -g appdmg

      - name: Patch JUCE for macOS 15 SDK compatibility
        if: matrix.runner == 'macos-15'
        run: |
          FILE="libs/JUCE/modules/juce_gui_basics/native/juce_Windowing_mac.mm"
          python3 -c "
          import re
          with open('$FILE', 'r') as f:
              src = f.read()
          # Wrap the CGWindowListCreateImage block in a macOS 15 SDK guard
          old = '        // CGWindowListCreateImage is replaced by functions in the ScreenCaptureKit framework, but\n        // that framework is only available from macOS 12.3 onwards.\n        // A suitable @available check should be added once the minimum build OS is 12.3 or greater,\n        // so that ScreenCaptureKit can be weak-linked.'
          new = '        // CGWindowListCreateImage was obsoleted in macOS 15 SDK.\n       #if defined (MAC_OS_VERSION_15_0) && MAC_OS_X_VERSION_MAX_ALLOWED >= MAC_OS_VERSION_15_0\n        return {};\n       #else'
          assert old in src, 'Could not find CGWindowListCreateImage comment block'
          src = src.replace(old, new)
          # Add closing #endif after 'CGImageRelease (screenShot)' return result block
          old2 = '        CGImageRelease (screenShot);\n\n        return result;\n    }\n}'
          new2 = '        CGImageRelease (screenShot);\n\n        return result;\n       #endif\n    }\n}'
          assert old2 in src, 'Could not find CGImageRelease return result block'
          src = src.replace(old2, new2)
          with open('$FILE', 'w') as f:
              f.write(src)
          print('JUCE macOS 15 patch applied')
          "
          grep -n "return {};" "$FILE"

      - name: Configure CMake
        run: |
          cmake -Bbuild \
            -GXcode \
            -DCMAKE_OSX_ARCHITECTURES='${{ matrix.archs }}' \
            -DCMAKE_BUILD_TYPE=Release \
            -DBESPOKE_PORTABLE=True \
            -DBESPOKE_PYTHON_ROOT='/Library/Frameworks/Python.framework/Versions/3.10'

      - name: Build BespokeSynth
        run: |
          cmake --build build --config Release --target BespokeSynth --parallel 4

      - name: Build .dmg (nightly-package)
        continue-on-error: true
        run: |
          cmake --build build --config Release --target nightly-package --parallel 4

      - name: Locate artifacts
        id: artifacts
        run: |
          APP_PATH=$(find build -name "BespokeSynth.app" -type d | head -1)
          DMG_PATH=$(find build/nightly -name "*.dmg" -type f 2>/dev/null | head -1)

          echo "app_path=${APP_PATH}" >> "$GITHUB_OUTPUT"
          echo "dmg_path=${DMG_PATH}" >> "$GITHUB_OUTPUT"

          echo "APP: ${APP_PATH}"
          echo "DMG: ${DMG_PATH}"

          # Create a zip of the .app for upload
          if [ -n "$APP_PATH" ]; then
            ditto -c -k --keepParent "$APP_PATH" build/BespokeSynth-macOS.app.zip
          fi

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: BespokeSynth-${{ matrix.runner }}-app
          path: build/BespokeSynth-macOS.app.zip
          if-no-files-found: warn

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: BespokeSynth-${{ matrix.runner }}-dmg
          path: build/nightly/*.dmg
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build-macos
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          files: |
            artifacts/BespokeSynth-*-app/*.zip
            artifacts/BespokeSynth-*-dmg/*.dmg
